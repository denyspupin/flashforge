name: flashforge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashforge
      POSTGRES_PASSWORD: flashforge
      POSTGRES_DB: flashforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashforge -d flashforge"]
      interval: 2s
      timeout: 5s
      retries: 20

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flashforge
      POSTGRES_PASSWORD: flashforge
      POSTGRES_DB: flashforge_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashforge -d flashforge_test"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
