name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TEST_DATABASE_URL: postgresql://flashforge:flashforge@localhost:5432/flashforge_test

jobs:
  lint-build:
    name: Lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          CLERK_WEBHOOK_SECRET: whsec_ci_placeholder
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /login
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /register
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /dashboard
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write test env
        run: |
          echo "TEST_DATABASE_URL=$TEST_DATABASE_URL" > tests/.env.test
          echo "CLERK_WEBHOOK_SECRET=whsec_ci_placeholder" >> tests/.env.test

      - name: Unit tests
        run: pnpm test:unit

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flashforge
          POSTGRES_PASSWORD: flashforge
          POSTGRES_DB: flashforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flashforge -d flashforge_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      TEST_DATABASE_URL: postgresql://flashforge:flashforge@localhost:5432/flashforge_test
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write test env
        run: |
          echo "TEST_DATABASE_URL=$TEST_DATABASE_URL" > tests/.env.test
          echo "CLERK_WEBHOOK_SECRET=whsec_ci_placeholder" >> tests/.env.test

      - name: Apply migrations to test database
        run: pnpm db:migrate:test

      - name: Integration tests
        run: pnpm test:integration
